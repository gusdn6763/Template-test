name: 🐛 버그 리포트
description: 발견한 버그를 보고합니다
title: "[Bug] "
labels: ["type:bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: 🐛 버그 설명
      description: 어떤 문제가 발생했나요?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 🔄 재현 방법
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ 기대 동작

  - type: textarea
    id: actual
    attributes:
      label: ❌ 실제 동작

  - type: textarea
    id: environment
    attributes:
      label: 💻 환경
      value: |
        - OS: 
        - Browser/Tool: 
        - 발생 API: