name: ✨ 기능 개발
description: 새로운 기능 구현 이슈를 생성합니다
title: "[도메인] 작업 제목"
labels: ["type:feature"]
body:
  - type: dropdown
    id: domain
    attributes:
      label: 도메인
      description: 어느 도메인 작업인가요?
      options:
        - Common
        - Department
        - Employee
        - File
        - ChangeLog
        - Backup
        - Deploy
        - Docs
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 📌 작업 내용
      description: 체크리스트 형태로 작성해주세요
      value: |
        - [ ] 
        - [ ] 
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 🎯 완료 조건
      description: 어떤 상태가 되면 완료된 것인지 작성해주세요
      placeholder: |
        - Swagger에서 정상 동작 확인
        - 응답 포맷이 명세와 일치
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: 📎 참고
      description: 관련 API 명세, 의존 이슈, 참고 링크 등
      placeholder: |
        - 관련 이슈: #
        - API 명세: 

  - type: input
    id: estimate
    attributes:
      label: ⏱️ 예상 소요 시간
      placeholder: "예: 2시간"